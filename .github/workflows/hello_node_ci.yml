name: Second CI 

on: 
    push:

    workflow_dispatch:
      
jobs:
    build-test:
        runs-on: ubuntu-latest # Runner machine that gets provisioned to run the job

        steps:
          - name: Checkout code
            uses: actions/checkout@v6

          - name: Set up Node.js
            uses: actions/setup-node@v6
            with:
              node-version: 24

          - name: Install dependencies
            #working-directory: docker/app1-hello/node
            #run: npm ci # only works if your repository contains: package.json and package-lock.json 
            run: npm install #If there is no package-lock.json

          - name: Run Tests (If any)
            #working-directory: docker/app1-hello/node
            run: npm test --if-present             
    
    docker-build-push:
        runs-on: ubuntu-latest # Runner machine that gets provisioned to run the job
        needs: build-test
        steps:
          - name: Checkout code
            uses: actions/checkout@v6

          - name: Login to Docker Hub
            uses: docker/login-action@v4
            with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PASSWORD }}

          - name: Build and push
            uses: docker/build-push-action@v7
            with:
                # context: docker/app1-hello/node # Where the Dockerfile is located
                push: true
                tags: |
                    ${{ secrets.DOCKERHUB_USERNAME }}/hello-node:latest      
